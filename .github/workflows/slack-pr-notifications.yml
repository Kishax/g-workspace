name: Slack PR Notifications

# すべてのPR作成・更新時に実行
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# 必要な権限を明示的に設定
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    name: "Slack PR通知"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR情報の収集
        id: pr-info
        run: |
          # PR情報を環境変数に設定
          echo "pr_number=${{ github.event.number }}" >> $GITHUB_OUTPUT
          echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "pr_author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "pr_url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
          echo "source_branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          echo "target_branch=${{ github.base_ref }}" >> $GITHUB_OUTPUT
          echo "action=${{ github.event.action }}" >> $GITHUB_OUTPUT

          # 変更ファイル数を取得
          changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | wc -l)
          echo "changed_files=$changed_files" >> $GITHUB_OUTPUT

          # アクションに応じたアイコンとメッセージ
          case "${{ github.event.action }}" in
            "opened")
              echo "action_icon=🆕" >> $GITHUB_OUTPUT
              echo "action_text=新しいPRが作成されました" >> $GITHUB_OUTPUT
              ;;
            "synchronize")
              echo "action_icon=🔄" >> $GITHUB_OUTPUT
              echo "action_text=PRが更新されました" >> $GITHUB_OUTPUT
              ;;
            "reopened")
              echo "action_icon=🔄" >> $GITHUB_OUTPUT
              echo "action_text=PRが再オープンされました" >> $GITHUB_OUTPUT
              ;;
            "closed")
              if [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
                echo "action_icon=✅" >> $GITHUB_OUTPUT
                echo "action_text=PRがマージされました" >> $GITHUB_OUTPUT
              else
                echo "action_icon=❌" >> $GITHUB_OUTPUT
                echo "action_text=PRがクローズされました" >> $GITHUB_OUTPUT
              fi
              ;;
          esac

      - name: Slack通知（Webhook）
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: "#development"
          username: "GitHub PR Bot"
          icon_emoji: ":octocat:"
          text: |
            ${{ steps.pr-info.outputs.action_icon }} *${{ steps.pr-info.outputs.action_text }}*

            *📋 PR情報:*
            • *タイトル*: ${{ steps.pr-info.outputs.pr_title }}
            • *作成者*: ${{ steps.pr-info.outputs.pr_author }}
            • *ブランチ*: `${{ steps.pr-info.outputs.source_branch }}` → `${{ steps.pr-info.outputs.target_branch }}`
            • *変更ファイル*: ${{ steps.pr-info.outputs.changed_files }}件

            *🔗 リンク*: ${{ steps.pr-info.outputs.pr_url }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: フォールバック通知（GitHub コメント）
        if: env.SLACK_WEBHOOK_URL == '' && github.event.action == 'opened'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            try {
              const comment = `
              ## 🤖 PR作成通知

              ${{ steps.pr-info.outputs.action_icon }} **${{ steps.pr-info.outputs.action_text }}**

              **ℹ️ 注意**: Slack通知の設定が完了していません。
              リポジトリの設定で \`SLACK_WEBHOOK_URL\` シークレットを追加してください。

              **📊 PR統計:**
              - 変更ファイル数: ${{ steps.pr-info.outputs.changed_files }}
              - 作成者: ${{ steps.pr-info.outputs.pr_author }}
              - ソースブランチ: \`${{ steps.pr-info.outputs.source_branch }}\`
              - ターゲットブランチ: \`${{ steps.pr-info.outputs.target_branch }}\`

              ---
              *この通知は自動生成されました。Slack連携が有効になると、このコメントは表示されなくなります。*
              `;

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
              
              console.log('✅ GitHubコメント通知を作成しました');
            } catch (error) {
              console.log('⚠️ GitHubコメント作成に失敗しました:', error.message);
              console.log('💡 Slack Webhook URLを設定してSlack通知をご利用ください');
            }

      - name: 通知状況の確認
        run: |
          echo "📊 通知実行結果:"
          if [[ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]]; then
            echo "✅ Slack通知: 実行済み"
          else
            echo "⚠️ Slack通知: SLACK_WEBHOOK_URL が設定されていません"
            echo "💡 GitHub リポジトリの Settings > Secrets and variables > Actions で設定してください"
            echo "📝 フォールバック: GitHubコメント通知を試行しました"
          fi

          echo ""
          echo "🔍 PR詳細:"
          echo "- アクション: ${{ steps.pr-info.outputs.action }}"
          echo "- PR番号: #${{ steps.pr-info.outputs.pr_number }}"
          echo "- タイトル: ${{ steps.pr-info.outputs.pr_title }}"
          echo "- 作成者: ${{ steps.pr-info.outputs.pr_author }}"
          echo "- ブランチ: ${{ steps.pr-info.outputs.source_branch }} → ${{ steps.pr-info.outputs.target_branch }}"
          echo "- 変更ファイル: ${{ steps.pr-info.outputs.changed_files }}件"
          
          echo ""
          echo "🔧 権限確認:"
          echo "- contents: read ✅"
          echo "- pull-requests: write ✅" 
          echo "- issues: write ✅"


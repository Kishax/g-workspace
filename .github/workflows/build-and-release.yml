name: Build and Release Cross-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  # Linux Build (AppImage)
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flet
    
    - name: Build Linux AppImage
      run: |
        cd flet_app
        flet build linux --verbose
    
    - name: Upload Linux Build
      uses: actions/upload-artifact@v3
      with:
        name: linux-appimage
        path: flet_app/build/linux/

  # Web Build (PWA)
  build-web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flet
    
    - name: Build Web PWA
      run: |
        cd flet_app
        flet build web --verbose
    
    - name: Upload Web Build
      uses: actions/upload-artifact@v3
      with:
        name: web-pwa
        path: flet_app/build/web/

  # Windows Build (EXE)
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flet
    
    - name: Build Windows EXE
      run: |
        cd flet_app
        flet build windows --verbose
    
    - name: Upload Windows Build
      uses: actions/upload-artifact@v3
      with:
        name: windows-exe
        path: flet_app/build/windows/

  # macOS Build (APP + DMG)
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flet
    
    - name: Build macOS APP
      run: |
        cd flet_app
        flet build macos --verbose
    
    - name: Create DMG (if applicable)
      run: |
        # DMG作成は後続のステップで実装予定
        echo "DMG creation step placeholder"
    
    - name: Upload macOS Build
      uses: actions/upload-artifact@v3
      with:
        name: macos-app
        path: flet_app/build/macos/

  # Android Build (APK)
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flet
    
    - name: Build Android APK
      run: |
        cd flet_app
        flet build apk --verbose
    
    - name: Upload Android Build
      uses: actions/upload-artifact@v3
      with:
        name: android-apk
        path: flet_app/build/apk/

  # iOS Build (IPA) - macOSでのみ実行可能
  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flet
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Build iOS IPA
      run: |
        cd flet_app
        flet build ipa --verbose
    
    - name: Upload iOS Build
      uses: actions/upload-artifact@v3
      with:
        name: ios-ipa
        path: flet_app/build/ipa/

  # Release Creation
  create-release:
    needs: [build-linux, build-web, build-windows, build-macos, build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ github.event.inputs.version || github.ref_name }}
        name: Release ${{ github.event.inputs.version || github.ref_name }}
        body: |
          ## 🚀 Kishax G Project Release ${{ github.event.inputs.version || github.ref_name }}
          
          ### 📦 ダウンロード
          
          | プラットフォーム | ファイル | 用途 |
          |----------------|----------|------|
          | 🐧 **Linux** | `linux-appimage/` | Ubuntu/Debian等で実行 |
          | 🌐 **Web** | `web-pwa/` | ブラウザ・PWA |
          | 🪟 **Windows** | `windows-exe/` | Windows 10/11 |
          | 🍎 **macOS** | `macos-app/` | macOS |
          | 📱 **Android** | `android-apk/` | Android端末 |
          | 📱 **iOS** | `ios-ipa/` | iPhone/iPad |
          
          ### 🛠️ インストール方法
          
          **Linux**: AppImageファイルに実行権限を付与して実行
          **Web**: ブラウザでindex.htmlを開く、またはWebサーバーにデプロイ
          **Windows**: EXEファイルを実行
          **macOS**: APPファイルをアプリケーションフォルダに移動
          **Android**: APKファイルをインストール（設定で不明なソースを許可）
          **iOS**: 開発者証明書が必要（App Store配布予定）
          
          ### 🔄 変更内容
          - 最新の機能追加とバグ修正
          - パフォーマンス改善
          - UI/UX向上
          
          ### 📞 サポート
          問題やバグ報告は[Issues](https://github.com/Kishax/g-workspace/issues)でお知らせください。
        artifacts: |
          linux-appimage/**/*
          web-pwa/**/*
          windows-exe/**/*
          macos-app/**/*
          android-apk/**/*
          ios-ipa/**/*
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}